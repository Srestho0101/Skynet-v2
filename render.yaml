services:
  - type: web
    name: skynet-v2
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skynet_db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
    connect: false

databases:
  - name: skynet_db
    databaseName: skynet_xfta
    user: skynet_user
    plan: free
    region: oregon